# ── API ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.TU_DOMINIO;

    ssl_certificate     /etc/nginx/certs/live/api.TU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/api.TU_DOMINIO/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 2G;

    location / {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

# ── Frontend ──────────────────────────────────────────
server {
    listen 443 ssl;
    server_name app.TU_DOMINIO;

    ssl_certificate     /etc/nginx/certs/live/app.TU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/app.TU_DOMINIO/privkey.pem;

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }
}

# ── Redirect HTTP → HTTPS ─────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
